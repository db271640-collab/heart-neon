<!DOCTYPE html>
<html>
<head>
    <title>For You ❤️</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        canvas { display: block; }
        h1 {
            position: absolute; top: 80%; width: 100%;
            text-align: center; color: #00f7ff; font-family: Arial;
            font-size: 28px; text-shadow: 0 0 20px #00f7ff;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <h1>For You ❤️</h1>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        let angle = 0;

        function getHeartPoint(t, scale) {
            let x = 16 * Math.pow(Math.sin(t), 3);
            let y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
            return [
                canvas.width/2 + x * scale,
                canvas.height/2 - y * scale
            ];
        }

        function animate() {
            ctx.fillStyle = 'rgba(0,0,0,0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = '#00f7ff';
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#00f7ff';
            ctx.lineWidth = 1;

            // bikin banyak lapis hati yg muter
            for(let layer = 0; layer < 5; layer++) {
                ctx.beginPath();
                let scale = 12 + layer * 4;
                for(let i = 0; i <= 360; i++) {
                    let t = i * Math.PI / 180;
                    let [x, y] = getHeartPoint(t + angle + layer * 0.2, scale);
                    if(i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.stroke();
            }

            angle += 0.005; // kecepatan muter
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
